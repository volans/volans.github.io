<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="description" content="Watermelon Counselling" />
    <meta name="author" content="Xiujing" />
    <title>Watermelon Counselling</title>

    <!-- Icon -->
    <link rel="icon" type="image/x-icon" href="static/assets/favicon.ico" />

    <!-- Bootstrap icons-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet" />

    <!-- Google fonts-->
    <link rel="preconnect" href="https://fonts.gstatic.com" />
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,600;1,600&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Mulish:ital,wght@0,300;0,500;0,600;0,700;1,300;1,500;1,600;1,700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,400;1,400&display=swap" rel="stylesheet" />

    <!-- Core theme CSS (includes Bootstrap)-->
    <link type="text/css" href="static/css/styles.css" rel="stylesheet" />
    <link type="text/css" href="static/css/main.css" rel="stylesheet" />

    <!-- 添加内联 CSS 调整背景 -->
    <style>
        /* 整体页面背景 */
        body {
            background: linear-gradient(to bottom, #f0f7e9, #ffffff); /* 浅绿到白色渐变 */
            color: #333;
        }
        /* 顶部背景 */
        .top-section {
            background: linear-gradient(135deg, #e6f0e0 0%, #fdd1d1 50%, #f5f5f5 100%); /* 西瓜主题渐变 */
            background-size: cover;
            min-height: 400px;
            position: relative;
        }
        .top-section-content {
            background: rgba(255, 255, 255, 0.3); /* 半透明遮罩 */
            padding: 20px;
        }
        .top-section-content h2 {
            color: #4a704a; /* 西瓜皮绿色 */
            font-weight: 600;
        }
        /* 导航栏 */
        .navbar {
            background: rgba(255, 255, 255, 0.9); /* 半透明白色 */
        }
        .navbar-brand, .nav-link {
            color: #4a704a !important; /* 绿色导航文字 */
        }
        .nav-link:hover {
            color: #fdd1d1 !important; /* 粉红悬停效果 */
        }
        /* 头像区域 */
        #avatar {
            text-align: center;
            margin-top: -50px; /* 稍微上移，与背景融合 */
        }
        #avatar img {
            border: 5px solid #fdd1d1; /* 粉红色边框，呼应西瓜 */
            border-radius: 10px;
        }
        /* 内容区 */
        .bg-gradient-primary-to-secondary-light, .bg-gradient-primary-to-secondary-gray {
            background: transparent; /* 移除原有渐变，依赖 body 背景 */
        }
        .main-body {
            background: rgba(255, 255, 255, 0.8); /* 半透明白色卡片 */
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
        h2 {
            color: #4a704a; /* 统一标题颜色 */
        }
        /* 页脚 */
        .bg-bottom {
            background: #e6f0e0; /* 浅绿色 */
            color: #4a704a;
        }
    </style>

    <!-- Bootstrap core JS-->
    <script type="text/javascript" src="static/js/bootstrap.bundle.min.js"></script>

    <!-- For Compatibility -->
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    
    <!-- Markdown -->
    <script type="text/javascript" src="static/js/marked.min.js"></script>

    <!-- Mathematics -->
    <script>
        MathJax = {
            tex: {
                packages: {},
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: false,
                processEnvironments: true,
                processRefs: true,
                digits: /^(?:[0-9]+(?:\{,\}[0-9]{3})*(?:\.[0-9]*)?|\.[0-9]+)/,
                tags: 'all',
                tagSide: 'right',
                tagIndent: '0.8em',
                useLabelIds: true,
                maxMacros: 10000,
                maxBuffer: 5 * 1024,
                formatError: (jax, err) => jax.formatError(err)
            }
        };
    </script>
    <script type="text/javascript" id="MathJax-script" src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
    <script type="text/javascript" id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Core JS-->
    <script type="text/javascript" src="static/js/scripts.js"></script>
    <script type="text/javascript" src="static/js/js-yaml.min.js"></script>

</head>

<body id="page-top">
    <!-- Navigation-->
    <nav class="header navbar navbar-expand-lg navbar-light fixed-top shadow-sm" id="mainNav">
        <div class="container px-5">
            <a id="page-top-title" class="navbar-brand fw-bold" href="#page-top">Watermelon Counselling</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarResponsive"
                aria-controls="navbarResponsive" aria-expanded="false" aria-label="Toggle navigation">
                MENU
                <i class="bi-list"></i>
            </button>
            <div class="collapse navbar-collapse" id="navbarResponsive">
                <ul class="navbar-nav ms-auto me-4 my-3 my-lg-0">
                    <li class="nav-item"><a class="nav-link me-lg-3" href="#page-top">HOME</a></li>
                    <li class="nav-item"><a class="nav-link me-lg-3" href="#publications">English</a></li>
                    <li class="nav-item"><a class="nav-link me-lg-3" href="#awards">中文</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Top Section -->
    <section class="top-section">
        <div class="top-section-content">
            <div class="container px-5">
                <h2 id="top-section-bg-text" class="display-3 lh-1 font-alt">Watermelon Counselling</h2>
            </div>
        </div>
    </section>

    <!-- Photo -->
    <div class="container px-5">
        <div id="avatar">
            <img class="shadow" src="static/assets/img/photo.png">
        </div>
    </div>
    
    <!-- Home -->
    <section class="bg-gradient-primary-to-secondary-light mt5 md5" id="home">
        <div class="container px-5">
            <header>
                <h2 id="home-subtitle"></h2>
            </header>
            <div class="main-body" id="home-md"></div>
        </div>
    </section>

    <!-- Publications -->
    <section class="bg-gradient-primary-to-secondary-gray mt5 md5" id="publications">
        <div class="container px-5">
            <header>
                <h2 id="publications-subtitle"><i class="bi bi-file-text-fill"></i> Welcome to Watermelon Counselling</h2>
            </header>
            <div class="main-body" id="publications-md"></div>
        </div>
    </section>

    <!-- Awards -->
    <section class="bg-gradient-primary-to-secondary-light mt5 md5" id="awards">
        <div class="container px-5">
            <header>
                <h2 id="awards-subtitle"><i class="bi bi-file-text-fill"></i> 欢迎体验西瓜心理咨询</h2>
            </header>
            <div class="main-body" id="awards-md"></div>
        </div>
    </section>

    <!-- Footer-->
    <footer class="bg-bottom text-center py-5">
        <div class="container px-5">
            <div class="text-white-50 small">
                <div id="copyright-text" class="mb-2"></div>
            </div>
        </div>
    </footer>

</body>
</html>
